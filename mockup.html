<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSEmarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #ebebeb;
      --text: #0d0d0d;
      --text-2: #6b6b6b;
      --text-3: #a0a0a0;
      --gain: #009e52;
      --loss: #e53935;
      --flat: #6b6b6b;
      --accent: #0052ff;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.4px; }
    .logo span { color: var(--accent); }

    .nav-index { display: flex; align-items: baseline; gap: 7px; }
    .nav-index-label { font-size: 11px; color: var(--text-3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .nav-index-val { font-family: var(--mono); font-size: 14px; font-weight: 600; }
    .nav-index-chg { font-family: var(--mono); font-size: 12px; font-weight: 500; }

    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-2); }
    .breadth { display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gain); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-time { color: var(--text-3); font-size: 11px; }
    .nav-div { color: var(--border); }

    /* ── PAGE ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 120px; }

    /* ── MOVERS STRIP ── */
    .movers {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .mover {
      flex: 1;
      background: var(--surface);
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.12s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .mover:hover { background: #fafafa; }
    .mover-left {}
    .mover-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-3); margin-bottom: 3px; }
    .mover-sym { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; }
    .mover-price { font-family: var(--mono); font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .mover-chg { font-family: var(--mono); font-size: 18px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; }

    /* ── TABLE SECTION ── */
    .table-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .tabs { display: flex; gap: 2px; }
    .tab {
      font-size: 13px; font-weight: 500; padding: 5px 13px;
      border-radius: 20px; border: none; background: none;
      color: var(--text-2); cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; gap: 5px;
    }
    .tab:hover { color: var(--text); background: var(--bg); }
    .tab.active { background: var(--text); color: #fff; }
    .tab-count {
      font-size: 10px; font-family: var(--mono); font-weight: 600;
      background: rgba(255,255,255,0.2); border-radius: 8px;
      padding: 1px 5px; min-width: 16px; text-align: center;
    }
    .tab:not(.active) .tab-count { background: #ebebeb; color: var(--text-2); }

    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-3); width: 14px; height: 14px; pointer-events: none; }
    .search { padding: 6px 10px 6px 29px; font-size: 13px; font-family: var(--sans); border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); outline: none; width: 170px; transition: border-color 0.12s; }
    .search:focus { border-color: #c0c0c0; background: #fff; }
    .search::placeholder { color: var(--text-3); }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase;
      color: var(--text-3); padding: 9px 16px; text-align: left;
      background: #fafafa; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text-2); }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid #f4f4f4; cursor: pointer; transition: background 0.08s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody tr.active { background: #f0f4ff; }
    td { padding: 12px 16px; vertical-align: middle; }
    .r { text-align: right; }
    .td-sym { font-weight: 600; font-size: 14px; letter-spacing: -0.2px; display: flex; align-items: center; gap: 8px; }
    .star-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 14px; line-height: 1; padding: 0; transition: color 0.12s; flex-shrink: 0; }
    .star-btn:hover { color: #f59e0b; }
    .star-btn.starred { color: #f59e0b; }
    .td-price { font-family: var(--mono); font-weight: 500; font-size: 13px; }
    .td-chg { font-family: var(--mono); font-weight: 600; font-size: 13px; }
    .td-meta { font-family: var(--mono); font-size: 12px; color: var(--text-2); }
    .gain { color: var(--gain); }
    .loss { color: var(--loss); }
    .flat { color: var(--flat); }

    .empty { text-align: center; padding: 48px 16px; color: var(--text-3); font-size: 13px; }

    /* ── DRAWER ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0; z-index: 201;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
      max-height: 86vh; overflow-y: auto;
    }
    .drawer.open { transform: translateY(0); }
    .handle { width: 32px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .drawer-body { max-width: 860px; margin: 0 auto; padding: 18px 24px 40px; }

    .dh { display: flex; justify-content: space-between; align-items: flex-start; }
    .d-sym { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    .d-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .close-btn { background: var(--bg); border: none; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-2); transition: background 0.12s; }
    .close-btn:hover { background: var(--border); }

    .d-price-row { display: flex; align-items: flex-start; gap: 10px; margin: 10px 0 16px; }
    .d-price { font-family: var(--mono); font-size: 34px; font-weight: 700; letter-spacing: -1px; }
    .d-chg-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; padding-top: 6px; }
    .d-chg { font-family: var(--mono); font-size: 15px; font-weight: 600; }
    .d-chg-scope { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.02em; }

    .range-tabs { display: flex; gap: 3px; margin-bottom: 10px; }
    .rbtn { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 5px; border: none; background: none; color: var(--text-3); cursor: pointer; transition: all 0.12s; font-family: var(--sans); }
    .rbtn:hover { background: var(--bg); color: var(--text-2); }
    .rbtn.active { background: var(--text); color: #fff; }

    .chart-wrap { height: 180px; position: relative; }

    .stats { display: grid; grid-template-columns: repeat(4,1fr); margin-top: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .stat { padding: 12px 14px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .stat:nth-child(4n) { border-right: none; }
    .stat:nth-last-child(-n+4) { border-bottom: none; }
    .stat-l { font-size: 10px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
    .stat-v { font-family: var(--mono); font-size: 14px; font-weight: 600; }

    @media (max-width: 680px) {
      .movers { flex-direction: column; }
      .nav-right .breadth:not(:first-child) { display: none; }
      .col-vol, .col-val { display: none; }
      .stats { grid-template-columns: repeat(2,1fr); }
      .stats .stat:nth-child(4n) { border-right: 1px solid var(--border); }
      .stats .stat:nth-child(2n) { border-right: none; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">DSE<span>market</span></div>
</nav>

<div class="page">

  <!-- MOVERS STRIP -->
  <div class="movers">
    <div class="mover" onclick="openDrawer('FINEFOODS')">
      <div class="mover-left">
        <div class="mover-tag">Top Gainer</div>
        <div class="mover-sym">FINEFOODS</div>
        <div class="mover-price">৳ 487.3</div>
      </div>
      <div class="mover-chg gain">+1.04%</div>
    </div>
    <div class="mover" onclick="openDrawer('LOVELLO')">
      <div class="mover-left">
        <div class="mover-tag">Top Loser</div>
        <div class="mover-sym">LOVELLO</div>
        <div class="mover-price">৳ 64.7</div>
      </div>
      <div class="mover-chg loss">−4.43%</div>
    </div>
    <div class="mover" onclick="openDrawer('BRACBANK')">
      <div class="mover-left">
        <div class="mover-tag">Most Traded</div>
        <div class="mover-sym">BRACBANK</div>
        <div class="mover-price">৳ 65.88 Mn value</div>
      </div>
      <div class="mover-chg" style="color:var(--text);font-size:15px">972K<br><span style="font-size:10px;font-weight:500;color:var(--text-2)">vol</span></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="toolbar">
      <div class="tabs">
        <button class="tab active" onclick="setTab(this,'all')">All <span class="tab-count" id="cnt-all">30</span></button>
        <button class="tab" onclick="setTab(this,'gainers')">Gainers <span class="tab-count" id="cnt-gainers">2</span></button>
        <button class="tab" onclick="setTab(this,'losers')">Losers <span class="tab-count" id="cnt-losers">27</span></button>
        <button class="tab" onclick="setTab(this,'top30')">Top 30 <span class="tab-count" id="cnt-top30">30</span></button>
        <button class="tab" onclick="setTab(this,'watchlist')">Watchlist <span class="tab-count" id="cnt-watchlist">0</span></button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" class="search" type="text" placeholder="Search symbol…" oninput="renderTable()" />
      </div>
    </div>
    <div style="overflow:auto;max-height:530px">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('code')" style="width:36px;padding-right:0"></th>
            <th onclick="sortBy('code')">Symbol</th>
            <th class="r" onclick="sortBy('ltp')">Price</th>
            <th class="r" onclick="sortBy('change')">Change</th>
            <th class="r col-vol" onclick="sortBy('volume')">Volume</th>
            <th class="r col-val" onclick="sortBy('value')">Value (Mn)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="handle"></div>
  <div class="drawer-body">
    <div class="dh">
      <div>
        <div class="d-sym" id="d-sym">—</div>
        <div class="d-sub">Dhaka Stock Exchange · DSE</div>
      </div>
      <button class="close-btn" onclick="closeDrawer()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="d-price-row">
      <span class="d-price" id="d-price">—</span>
      <div class="d-chg-wrap">
        <span class="d-chg" id="d-chg">—</span>
        <span class="d-chg-scope" id="d-chg-scope"></span>
      </div>
    </div>
    <div class="range-tabs">
      <button class="rbtn active" onclick="setRange(this,'1M')">1M</button>
      <button class="rbtn" onclick="setRange(this,'3M')">3M</button>
      <button class="rbtn" onclick="setRange(this,'6M')">6M</button>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Open</div><div class="stat-v" id="d-open">—</div></div>
      <div class="stat"><div class="stat-l">Prev Close</div><div class="stat-v" id="d-ycp">—</div></div>
      <div class="stat"><div class="stat-l">High</div><div class="stat-v gain" id="d-high">—</div></div>
      <div class="stat"><div class="stat-l">Low</div><div class="stat-v loss" id="d-low">—</div></div>
      <div class="stat"><div class="stat-l">Volume</div><div class="stat-v" id="d-vol">—</div></div>
      <div class="stat"><div class="stat-l">Value (Mn)</div><div class="stat-v" id="d-val">—</div></div>
      <div class="stat"><div class="stat-l">Trades</div><div class="stat-v" id="d-trade">—</div></div>
      <div class="stat"><div class="stat-l">52W Range</div><div class="stat-v" id="d-52w">—</div></div>
    </div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:3000/v1/dse';

let stocks = [];
let top30Codes = new Set();
let watchlist = JSON.parse(localStorage.getItem('dse_watchlist') || '[]');
let tab = 'all';
let sort = { key: null, asc: true };
let activeCode = null;
let chartInst = null;
/** Chart window: calendar months back from today (local date), not fixed day counts */
let chartRange = '1M';

function cleanNum(v) {
  if (v === null || v === undefined || v === '' || v === '--') return 0;
  return parseFloat(String(v).replace(/,/g, '')) || 0;
}
function fmtNum(v) {
  return cleanNum(v).toLocaleString('en-US');
}
function fmtPrice(v) {
  return '৳\u202F' + cleanNum(v).toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
}
function toYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function startDateForChartRange(kind) {
  const d = new Date();
  if (kind === '1M') d.setMonth(d.getMonth() - 1);
  else if (kind === '3M') d.setMonth(d.getMonth() - 3);
  else d.setMonth(d.getMonth() - 6);
  return toYMD(d);
}
function normalizeChartRange(kind) {
  return kind === '3M' || kind === '6M' ? kind : '1M';
}
function periodTone(pct) {
  const eps = 1e-6;
  if (pct > eps) return 'gain';
  if (pct < -eps) return 'loss';
  return 'flat';
}

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('Request failed: ' + res.status);
  const json = await res.json();
  return json.data || [];
}

function normalizeRow(row, dsexPctMap) {
  const code = row['TRADING CODE'];
  const ycp = cleanNum(row['YCP*']);
  const ltp = cleanNum(row['LTP*']);
  const absChange = cleanNum(row['CHANGE']);
  const pctFromDsex = dsexPctMap.get(code);
  const pctChange = Number.isFinite(pctFromDsex) ? pctFromDsex : (ycp ? ((ltp - ycp) / ycp) * 100 : 0);

  return {
    code,
    ltp,
    high: cleanNum(row['HIGH']),
    low: cleanNum(row['LOW']),
    open: cleanNum(row['CLOSEP*']),
    ycp,
    change: pctChange,
    absChange,
    trade: cleanNum(row['TRADE']),
    value: cleanNum(row['VALUE (mn)']),
    volume: cleanNum(row['VOLUME']),
  };
}

function getData() {
  let d = [...stocks];
  if (tab === 'gainers') d = d.filter(s => s.change > 0);
  else if (tab === 'losers') d = d.filter(s => s.change < 0);
  else if (tab === 'top30') d = d.filter(s => top30Codes.has(s.code));
  else if (tab === 'watchlist') d = d.filter(s => watchlist.includes(s.code));

  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q) d = d.filter(s => s.code.toLowerCase().includes(q));

  if (sort.key) {
    d.sort((a, b) => {
      const va = a[sort.key];
      const vb = b[sort.key];
      if (sort.key === 'code') return sort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sort.asc ? va - vb : vb - va;
    });
  }
  return d;
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = stocks.length;
  document.getElementById('cnt-gainers').textContent = stocks.filter(s => s.change > 0).length;
  document.getElementById('cnt-losers').textContent = stocks.filter(s => s.change < 0).length;
  document.getElementById('cnt-top30').textContent = top30Codes.size;
  document.getElementById('cnt-watchlist').textContent = watchlist.length;
}

function renderMovers() {
  if (!stocks.length) return;
  const gainers = [...stocks].sort((a, b) => b.change - a.change);
  const losers = [...stocks].sort((a, b) => a.change - b.change);
  const volume = [...stocks].sort((a, b) => b.volume - a.volume);
  const topGainer = gainers[0];
  const topLoser = losers[0];
  const mostTraded = volume[0];

  document.querySelector('.movers').innerHTML = `
    <div class="mover" onclick="openDrawer('${topGainer.code}')">
      <div class="mover-left">
        <div class="mover-tag">Top Gainer</div>
        <div class="mover-sym">${topGainer.code}</div>
        <div class="mover-price">${fmtPrice(topGainer.ltp)}</div>
      </div>
      <div class="mover-chg gain">+${topGainer.change.toFixed(2)}%</div>
    </div>
    <div class="mover" onclick="openDrawer('${topLoser.code}')">
      <div class="mover-left">
        <div class="mover-tag">Top Loser</div>
        <div class="mover-sym">${topLoser.code}</div>
        <div class="mover-price">${fmtPrice(topLoser.ltp)}</div>
      </div>
      <div class="mover-chg loss">${topLoser.change.toFixed(2)}%</div>
    </div>
    <div class="mover" onclick="openDrawer('${mostTraded.code}')">
      <div class="mover-left">
        <div class="mover-tag">Most Traded</div>
        <div class="mover-sym">${mostTraded.code}</div>
        <div class="mover-price">৳ ${mostTraded.value.toFixed(2)} Mn value</div>
      </div>
      <div class="mover-chg" style="color:var(--text);font-size:15px">${fmtNum(mostTraded.volume)}<br><span style="font-size:10px;font-weight:500;color:var(--text-2)">vol</span></div>
    </div>
  `;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const data = getData();
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">${tab === 'watchlist' ? 'Star stocks to add them here' : 'No results'}</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(s => {
    const cls = s.change > 0 ? 'gain' : s.change < 0 ? 'loss' : 'flat';
    const sign = s.change > 0 ? '+' : '';
    const isActive = s.code === activeCode ? ' class="active"' : '';
    const isStarred = watchlist.includes(s.code);
    return `<tr${isActive} onclick="openDrawer('${s.code}')">
      <td style="padding-right:4px;width:36px">
        <button class="star-btn${isStarred ? ' starred' : ''}" onclick="toggleWatch('${s.code}',event)" title="Add to watchlist">
          ${isStarred ? '★' : '☆'}
        </button>
      </td>
      <td><span class="td-sym">${s.code}</span></td>
      <td class="td-price r">${fmtPrice(s.ltp)}</td>
      <td class="td-chg r ${cls}">${sign}${s.change.toFixed(2)}%</td>
      <td class="td-meta r col-vol">${fmtNum(s.volume)}</td>
      <td class="td-meta r col-val">${s.value.toFixed(2)}</td>
    </tr>`;
  }).join('');
}

function setTab(el, t) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function sortBy(key) {
  sort = sort.key === key ? { key, asc: !sort.asc } : { key, asc: false };
  renderTable();
}

function toggleWatch(code, e) {
  e.stopPropagation();
  if (watchlist.includes(code)) watchlist = watchlist.filter(c => c !== code);
  else watchlist.push(code);
  localStorage.setItem('dse_watchlist', JSON.stringify(watchlist));
  updateCounts();
  renderTable();
}

async function openDrawer(code) {
  const s = stocks.find(x => x.code === code);
  if (!s) return;

  activeCode = code;
  renderTable();
  document.getElementById('d-sym').textContent = s.code;
  document.getElementById('d-price').textContent = fmtPrice(s.ltp);
  const chgEl = document.getElementById('d-chg');
  const scopeEl = document.getElementById('d-chg-scope');
  chgEl.textContent = '…';
  chgEl.className = 'd-chg flat';
  scopeEl.textContent = 'Loading chart (' + normalizeChartRange(chartRange) + ')…';
  document.getElementById('d-open').textContent = fmtPrice(s.open);
  document.getElementById('d-ycp').textContent = fmtPrice(s.ycp);
  document.getElementById('d-high').textContent = fmtPrice(s.high);
  document.getElementById('d-low').textContent = fmtPrice(s.low);
  document.getElementById('d-vol').textContent = fmtNum(s.volume);
  document.getElementById('d-val').textContent = s.value.toFixed(2);
  document.getElementById('d-trade').textContent = fmtNum(s.trade);
  document.getElementById('d-52w').textContent = (s.absChange > 0 ? '+' : '') + s.absChange.toFixed(2);
  document.querySelectorAll('.rbtn').forEach((b, i) => b.classList.toggle('active', i === 0));
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');

  await loadChart(code, chartRange, s);
}

function closeDrawer() {
  activeCode = null;
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  if (chartInst) chartInst.destroy();
  chartInst = null;
  renderTable();
}

async function setRange(btn, kind) {
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  chartRange = normalizeChartRange(kind);
  if (activeCode) {
    const s = stocks.find(x => x.code === activeCode);
    await loadChart(activeCode, chartRange, s);
  }
}

function applyDrawerPeriodChange(pct, start, end, quote) {
  const chgEl = document.getElementById('d-chg');
  const scopeEl = document.getElementById('d-chg-scope');
  const tone = periodTone(pct);
  const sign = pct > 0 ? '+' : '';
  chgEl.textContent = sign + pct.toFixed(2) + '%';
  chgEl.className = 'd-chg ' + tone;
  scopeEl.textContent = 'vs first close · API ' + start + ' → ' + end;
  if (quote) {
    document.getElementById('d-price').textContent = fmtPrice(quote.ltp);
  }
}

async function loadChart(code, kind, quote) {
  const rangeKey = normalizeChartRange(kind);
  const start = startDateForChartRange(rangeKey);
  const end = toYMD(new Date());
  const rows = await fetchJson(`${API_BASE}/historical?start=${start}&end=${end}&code=${encodeURIComponent(code)}`);
  const valid = rows.filter(r => r.DATE && r['TRADING CODE']);

  if (!valid.length) {
    if (chartInst) chartInst.destroy();
    chartInst = null;
    if (quote) {
      const sign = quote.change > 0 ? '+' : '';
      document.getElementById('d-chg').textContent = sign + quote.change.toFixed(2) + '%';
      document.getElementById('d-chg').className = 'd-chg ' + periodTone(quote.change);
      document.getElementById('d-chg-scope').textContent = 'Today (no history for this range)';
    }
    return;
  }

  valid.sort((a, b) => a.DATE.localeCompare(b.DATE));
  const labels = valid.map(r => new Date(r.DATE).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }));
  const prices = valid.map(r => cleanNum(r['CLOSEP*'] || r['LTP*']));
  const first = prices[0];
  const last = prices[prices.length - 1];
  let periodPct = 0;
  if (first > 0) periodPct = +(((last - first) / first) * 100).toFixed(2);
  const tone = periodTone(periodPct);
  const color = tone === 'gain' ? '#009e52' : tone === 'loss' ? '#e53935' : '#6b6b6b';
  const bg = tone === 'gain' ? 'rgba(0,158,82,0.06)' : tone === 'loss' ? 'rgba(229,57,53,0.06)' : 'rgba(107,107,107,0.06)';
  document.getElementById('d-open').textContent = fmtPrice(valid[valid.length - 1]['OPENP*']);
  applyDrawerPeriodChange(periodPct, start, end, quote);

  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{ data: prices, borderColor: color, backgroundColor: bg, borderWidth: 1.5, fill: true, tension: 0.35, pointRadius: 0, pointHoverRadius: 4, pointHoverBackgroundColor: color }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#111', titleFont: { family: 'Inter', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 13, weight: '600' },
          padding: 10, callbacks: { label: c => '  ৳ ' + c.parsed.y.toFixed(2) }
        }
      },
      scales: {
        x: { display: true, grid: { display: false }, border: { display: false }, ticks: { font: { family: 'Inter', size: 11 }, color: '#a0a0a0', maxTicksLimit: 5, maxRotation: 0 } },
        y: { position: 'right', grid: { color: '#f0f0f0' }, border: { display: false }, ticks: { font: { family: 'JetBrains Mono', size: 11 }, color: '#a0a0a0', callback: v => '৳' + v } }
      }
    }
  });
}

async function init() {
  try {
    const [latestRows, dsexRows, top30Rows] = await Promise.all([
      fetchJson(`${API_BASE}/latest`),
      fetchJson(`${API_BASE}/dsexdata`),
      fetchJson(`${API_BASE}/top30`)
    ]);

    const dsexPctMap = new Map();
    dsexRows
      .filter(r => r['TRADING CODE'] && r['% CHANGE'] !== '')
      .forEach(r => dsexPctMap.set(r['TRADING CODE'], cleanNum(r['% CHANGE'])));

    stocks = latestRows
      .filter(r => r['TRADING CODE'] && /^[A-Z0-9().&-]+$/.test(r['TRADING CODE']) && r['LTP*'] !== '')
      .map(r => normalizeRow(r, dsexPctMap));

    top30Codes = new Set(top30Rows.filter(r => r['TRADING CODE']).map(r => r['TRADING CODE']));

    updateCounts();
    renderMovers();
    renderTable();
  } catch (err) {
    console.error(err);
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Failed to load market data</td></tr>';
  }
}

init();
</script>
